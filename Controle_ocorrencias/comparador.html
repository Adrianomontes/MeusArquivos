    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2">

        <div class="d-flex align-items-center gap-2">
            <label style="font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase;">🔗 Endereço:</label>
            <input type="text" id="campoLocalhostRodape" class="input-localhost-rodape" value="localhost:5000" onchange="atualizarEnderecoServidor(this.value)">
            <button type="button" class="btn-config-rodape" onclick="abrirGerenciadorTkinterDoRodape()">⚙️ Telas</button>
        </div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('clock').innerHTML = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        let telasAtivas = [];
        let indiceAtual = 0;
        let graficoInstancia = null;

        if (localStorage.getItem('monitor_ip_maquina')) {
            document.getElementById('campoLocalhostRodape').value = localStorage.getItem('monitor_ip_maquina');
        }

        function atualizarEnderecoServidor(novoValor) {
            localStorage.setItem('monitor_ip_maquina', novoValor.trim());
        }

        async function buscarTelasDoBanco() {
            try {
                let response = await fetch('/api/telas_ativas_monitor');
                let dados = await response.json();
                telasAtivas = dados.telas;
                
                if(telasAtivas.length === 0) {
                    if (graficoInstancia) { graficoInstancia.destroy(); graficoInstancia = null; }
                    document.getElementById('conteudo-dinamico').innerHTML = `
                        <h1 class="display-4 text-warning fw-bold">⚠️ NENHUMA TELA SELECIONADA</h1>
                        <p class="fs-5 text-muted">Vá ao Painel Central e clique em 'Configurar Telas' para flegar o que quer ver passar na TV.</p>
                    `;
                }
            } catch (error) {
                console.error("Erro ao sincronizar monitor:", error);
            }
        }

        function alternarCarrossel() {
            if (telasAtivas.length === 0) return;
            if (indiceAtual >= telasAtivas.length) indiceAtual = 0;

            const tela = telasAtivas[indiceAtual];
            const container = document.getElementById('conteudo-dinamico');
            document.getElementById('status-tela').innerText = `Exibindo Tela: ${indiceAtual + 1} de ${telasAtivas.length}`;

            if (graficoInstancia) { graficoInstancia.destroy(); graficoInstancia = null; }

            // ⚡ 1. SE RENDERIZAR O PAINEL DE MODAIS
            if (tela.nome === "Painel de Faturamento por Modais") {
                container.innerHTML = `
                    <h3 class="mb-3 text-start w-100" style="color:#10b981;">🚚 DISTRIBUIÇÃO OPERACIONAL POR MODALIDADE (MÊS ATUAL)</h3>
                    <div class="chart-container"><canvas id="canvasMonitor"></canvas></div>
                `;
                fetch('/api/dados_dashboard_expedicao')
                    .then(r => r.json())
                    .then(dados => {
                        const ctx = document.getElementById('canvasMonitor').getContext('2d');
                        graficoInstancia = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['Nosso Carro', 'FOB', 'Cliente Retira', 'CIF', 'Não Mapeado'],
                                datasets: [{
                                    data: [dados.modalidades_qtd["NOSSO CARRO"]||0, dados.modalidades_qtd["FOB"]||0, dados.modalidades_qtd["CLIENTE RETIRA"]||0, dados.modalidades_qtd["CIF"]||0, dados.modalidades_qtd["OUTROS"]||0],
                                    backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#64748b']
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    });

            // ⚡ 2. SE RENDERIZAR A TORRE DE CONTROLE (REVISADA PARA RECONHECER DADOS DE META DIÁRIA)
            } else if (tela.nome && tela.nome.toUpperCase().includes("TORRE")) {

                container.innerHTML = `
                    <h1 class="display-2">📋</h1>
                    <h2 class="fw-bold text-light">${tela.nome}</h2>

        function abrirGerenciadorTkinterDoRodape() {
            fetch('/api/abrir_gerenciador_monitor', { method: 'POST' })
                .catch(err => console.error("Erro ao chamar gerenciador:", err));
        }

        buscarTelasDoBanco().then(() => { alternarCarrossel(); });
        setInterval(buscarTelasDoBanco, 10000); 
        setInterval(alternarCarrossel, 8000); // Rotaciona a cada 8 segundos na TV
