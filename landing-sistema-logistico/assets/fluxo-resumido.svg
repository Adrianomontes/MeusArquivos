<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-label="Fluxo faturamento, expedicao e canhotos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="200" rx="12" fill="url(#bg)" stroke="#334155"/>
  <text x="460" y="28" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="11" letter-spacing="1" text-anchor="middle">UM UNICO BANCO - TELAS AMARRADAS - DADOS CONFI&#193;VEIS</text>
  <g font-family="Segoe UI, system-ui, sans-serif" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="24" y="55" width="170" height="90" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="109" cy="78" r="14" fill="#38bdf8" opacity="0.2"/>
      <text x="109" y="83" fill="#38bdf8" font-size="12" font-weight="700">NF</text>
      <text x="109" y="115" fill="#f8fafc" font-size="14" font-weight="700">Faturamento</text>
      <text x="109" y="132" fill="#94a3b8" font-size="10">NF-e emitidas</text>
    </g>
    <line x1="200" y1="100" x2="228" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <g filter="url(#shadow)">
      <rect x="240" y="55" width="170" height="90" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
      <circle cx="325" cy="78" r="14" fill="#10b981" opacity="0.2"/>
      <text x="325" y="83" fill="#10b981" font-size="12" font-weight="700">EXP</text>
      <text x="325" y="115" fill="#f8fafc" font-size="14" font-weight="700">Expedi&#231;&#227;o</text>
      <text x="325" y="132" fill="#94a3b8" font-size="10">Notas expedidas</text>
    </g>
    <line x1="416" y1="100" x2="444" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <g filter="url(#shadow)">
      <rect x="456" y="55" width="170" height="90" rx="10" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
      <circle cx="541" cy="78" r="14" fill="#8b5cf6" opacity="0.2"/>
      <text x="541" y="83" fill="#8b5cf6" font-size="12" font-weight="700">CAN</text>
      <text x="541" y="115" fill="#f8fafc" font-size="14" font-weight="700">Canhoto / Baixa</text>
      <text x="541" y="132" fill="#94a3b8" font-size="10">Prova de entrega</text>
    </g>
    <line x1="632" y1="100" x2="660" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <g filter="url(#shadow)">
      <rect x="672" y="55" width="224" height="90" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="784" cy="78" r="14" fill="#f59e0b" opacity="0.2"/>
      <text x="784" y="83" fill="#f59e0b" font-size="12" font-weight="700">OK</text>
      <text x="784" y="115" fill="#f8fafc" font-size="14" font-weight="700">Entrega confirmada</text>
      <text x="784" y="132" fill="#94a3b8" font-size="10">Status atualizado no painel</text>
