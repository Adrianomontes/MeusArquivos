<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 3180" width="1040" height="3180" role="img" aria-label="Fluxograma operacional logistico completo">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .tit{font-family:Segoe UI,system-ui,sans-serif;fill:#f8fafc;font-weight:700}
      .sub{font-family:Segoe UI,system-ui,sans-serif;fill:#94a3b8;font-size:11px}
      .mod{font-family:Consolas,monospace;fill:#38bdf8;font-size:10px}
      .fase{font-family:Segoe UI,system-ui,sans-serif;fill:#0f172a;font-size:11px;font-weight:800;letter-spacing:.08em}
    </style>
  </defs>
  <rect width="1040" height="3180" fill="#0f172a"/>
  <text x="520" y="42" class="tit" font-size="22" text-anchor="middle">FLUXOGRAMA OPERACIONAL LOG&#205;STICO</text>
  <text x="520" y="68" class="sub" font-size="13" text-anchor="middle">Do pedido ao indicador &#8212; controle ponta a ponta com telas integradas</text>

  <!-- FASE 1 -->
  <rect x="30" y="90" width="980" height="28" rx="6" fill="#38bdf8"/>
  <text x="520" y="109" class="fase" text-anchor="middle">FASE 1 &#8212; ENTRADA E CONTROLE DE PEDIDOS</text>
  <g>
    <rect x="80" y="135" width="880" height="118" rx="10" fill="#1e293b" stroke="#38bdf8"/>
    <text x="100" y="162" class="tit" font-size="14">Controle de pedidos e demanda</text>
    <text x="100" y="184" class="sub">Integra&#231;&#227;o ERP &#183; saldo &#183; pedido vinculado &#183; NF &#183; lead time pedido &#8594; faturamento</text>
    <text x="100" y="204" class="mod">/ver_estoque &#183; /curva_abc &#183; /auditar_apis_nomus &#183; campo Pedido no faturamento</text>
    <text x="100" y="224" class="sub">Gest&#227;o: visibilidade do backlog e prioriza&#231;&#227;o de separa&#231;&#227;o por criticidade ABC</text>
  </g>
  <line x1="520" y1="253" x2="520" y2="278" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 2 -->
  <rect x="30" y="285" width="980" height="28" rx="6" fill="#10b981"/>
  <text x="520" y="304" class="fase" text-anchor="middle">FASE 2 &#8212; CENTRO DE DISTRIBUI&#199;&#195;O (WMS)</text>
  <g>
    <rect x="80" y="330" width="420" height="118" rx="10" fill="#1e293b" stroke="#10b981"/>
    <text x="100" y="357" class="tit" font-size="14">Separa&#231;&#227;o (picking)</text>
    <text x="100" y="379" class="sub">Apontamento WMS &#183; posi&#231;&#227;o por NF e c&#243;digo &#183; DW_POSICAO_WMS</text>
    <text x="100" y="399" class="mod">/relatorio_faturamento + wms_apontamento.xlsx</text>
    <text x="100" y="419" class="sub">Acur&#225;cia: item certo, lugar certo, antes de embalar</text>
  </g>
  <g>
    <rect x="540" y="330" width="420" height="118" rx="10" fill="#1e293b" stroke="#10b981"/>
    <text x="560" y="357" class="tit" font-size="14">Embalagem e identifica&#231;&#227;o</text>
    <text x="560" y="379" class="sub">Volumes &#183; esp&#233;cie &#183; peso bruto &#183; etiquetas operacionais</text>
    <text x="560" y="399" class="mod">/gerador_etiquetas &#183; volumes na NF</text>
    <text x="560" y="419" class="sub">Rastreio f&#237;sico alinhado ao documento fiscal</text>
  </g>
  <line x1="520" y1="448" x2="520" y2="473" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 3 -->
  <rect x="30" y="480" width="980" height="28" rx="6" fill="#6366f1"/>
  <text x="520" y="499" class="fase" text-anchor="middle">FASE 3 &#8212; FATURAMENTO E DOCUMENTA&#199;&#195;O FISCAL</text>
  <g>
    <rect x="80" y="525" width="880" height="118" rx="10" fill="#1e293b" stroke="#6366f1"/>
    <text x="100" y="552" class="tit" font-size="14">Faturamento conciliado</text>
    <text x="100" y="574" class="sub">NF-e emitidas &#183; status faturada / expedida / em aberto / entregue &#183; anti-duplicidade</text>
    <text x="100" y="594" class="mod">/relatorio_faturamento &#183; /relatorio_faturamento_local</text>
    <text x="100" y="614" class="sub">Gest&#227;o: fonte &#250;nica da verdade financeiro-operacional</text>
  </g>
  <line x1="520" y1="643" x2="520" y2="668" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 4 -->
  <rect x="30" y="675" width="980" height="28" rx="6" fill="#0ea5e9"/>
  <text x="520" y="694" class="fase" text-anchor="middle">FASE 4 &#8212; INTELIG&#202;NCIA GEOGR&#193;FICA E PERFIL DE CLIENTES</text>
  <g>
    <rect x="80" y="720" width="420" height="118" rx="10" fill="#1e293b" stroke="#0ea5e9"/>
    <text x="100" y="747" class="tit" font-size="14">Clusters e mesorregi&#245;es</text>
    <text x="100" y="769" class="sub">CEP / IBGE &#183; mesorregi&#227;o &#183; microrregi&#227;o &#183; munic&#237;pio</text>
    <text x="100" y="789" class="mod">/roteirizador/auditoria &#183; base cep_mesorregiao_brasil</text>
    <text x="100" y="809" class="sub">Segmenta&#231;&#227;o geogr&#225;fica para rotas e SLA</text>
  </g>
  <g>
    <rect x="540" y="720" width="420" height="118" rx="10" fill="#1e293b" stroke="#0ea5e9"/>
    <text x="560" y="747" class="tit" font-size="14">Perfil de clientes</text>
    <text x="560" y="769" class="sub">Curva ABC &#183; pra&#231;as de atendimento &#183; clusters de demanda</text>
    <text x="560" y="789" class="mod">/curva_abc &#183; /painel_pracas &#183; /tv_pracas</text>
    <text x="560" y="809" class="sub">Prioriza&#231;&#227;o comercial e log&#237;stica por perfil</text>
  </g>
  <line x1="520" y1="838" x2="520" y2="863" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 5 -->
  <rect x="30" y="870" width="980" height="28" rx="6" fill="#8b5cf6"/>
  <text x="520" y="889" class="fase" text-anchor="middle">FASE 5 &#8212; PLANEJAMENTO DE ROTAS E MONTAGEM DE CARGA</text>
  <g>
    <rect x="80" y="915" width="420" height="118" rx="10" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="100" y="942" class="tit" font-size="14">Identifica&#231;&#227;o de rotas</text>
    <text x="100" y="964" class="sub">Cadastro UF &#183; faixa CEP &#183; transportadora por rota</text>
    <text x="100" y="984" class="mod">/roteirizador/cadastro &#183; /roteirizador</text>
    <text x="100" y="1004" class="sub">Padroniza&#231;&#227;o do direcionamento de entregas</text>
  </g>
  <g>
    <rect x="540" y="915" width="420" height="118" rx="10" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="560" y="942" class="tit" font-size="14">Montagem de carga / sa&#237;da do dia</text>
    <text x="560" y="964" class="sub">Notas n&#227;o expedidas &#183; filtros avan&#231;ados &#183; drag-and-drop em rotas</text>
    <text x="560" y="984" class="mod">/roteirizador/montagem</text>
    <text x="560" y="1004" class="sub">Carga otimizada antes do embarque f&#237;sico</text>
  </g>
  <line x1="520" y1="1033" x2="520" y2="1058" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 6 -->
  <rect x="30" y="1065" width="980" height="28" rx="6" fill="#f59e0b"/>
  <text x="520" y="1084" class="fase" text-anchor="middle">FASE 6 &#8212; EXPEDI&#199;&#195;O E MODAL DE TRANSPORTE</text>
  <g>
    <rect x="80" y="1110" width="880" height="118" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="100" y="1137" class="tit" font-size="14">Controle de expedi&#231;&#227;o</text>
    <text x="100" y="1159" class="sub">Relat&#243;rio de notas expedidas &#183; cruzamento faturamento &#183; expedi&#231;&#227;o</text>
    <text x="100" y="1179" class="mod">/relatorio_expedicao &#183; upload expedicao_manual.xlsx</text>
    <text x="100" y="1199" class="sub">Prova do que saiu do CD &#8212; elimina nota fantasma</text>
  </g>
  <g>
    <rect x="80" y="1245" width="880" height="145" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-dasharray="6 3"/>
    <text x="100" y="1272" class="tit" font-size="14">Expedi&#231;&#227;o por modal e transportadora</text>
    <text x="100" y="1294" class="sub">De-para MODAIS.csv: NOSSO CARRO &#183; CIF &#183; FOB &#183; CLIENTE RETIRA &#183; CONTRATADAS</text>
    <text x="100" y="1318" class="mod">/gerenciar_transportadoras &#183; /relatorio_transportadoras &#183; de_para_modais</text>
    <rect x="100" y="1332" width="155" height="42" rx="6" fill="#0f172a" stroke="#38bdf8"/>
    <text x="177" y="1357" class="sub" text-anchor="middle" fill="#38bdf8">Nosso carro</text>
    <rect x="270" y="1332" width="155" height="42" rx="6" fill="#0f172a" stroke="#10b981"/>
    <text x="347" y="1357" class="sub" text-anchor="middle" fill="#10b981">Contratadas</text>
    <rect x="440" y="1332" width="155" height="42" rx="6" fill="#0f172a" stroke="#f59e0b"/>
    <text x="517" y="1357" class="sub" text-anchor="middle" fill="#f59e0b">FOB / Coletas</text>
    <rect x="610" y="1332" width="155" height="42" rx="6" fill="#0f172a" stroke="#8b5cf6"/>
    <text x="687" y="1357" class="sub" text-anchor="middle" fill="#8b5cf6">CIF</text>
    <rect x="780" y="1332" width="155" height="42" rx="6" fill="#0f172a" stroke="#94a3b8"/>
    <text x="857" y="1357" class="sub" text-anchor="middle" fill="#94a3b8">Cliente retira</text>
  </g>
  <line x1="520" y1="1390" x2="520" y2="1415" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 7 -->
  <rect x="30" y="1422" width="980" height="28" rx="6" fill="#ec4899"/>
  <text x="520" y="1441" class="fase" text-anchor="middle">FASE 7 &#8212; ENTREGA, CANHOTOS E BAIXAS</text>
  <g>
    <rect x="80" y="1467" width="270" height="110" rx="10" fill="#1e293b" stroke="#ec4899"/>
    <text x="100" y="1494" class="tit" font-size="13">Canhoto motorista</text>
    <text x="100" y="1516" class="mod">/canhoto_motorista</text>
    <text x="100" y="1536" class="sub">Assinatura digital mobile</text>
  </g>
  <g>
    <rect x="370" y="1467" width="270" height="110" rx="10" fill="#1e293b" stroke="#ec4899"/>
    <text x="390" y="1494" class="tit" font-size="13">Baixa de entrega</text>
    <text x="390" y="1516" class="mod">/baixa_entrega_mobile</text>
    <text x="390" y="1536" class="sub">/buscar_nf_baixa</text>
  </g>
  <g>
    <rect x="660" y="1467" width="300" height="110" rx="10" fill="#1e293b" stroke="#ec4899"/>
    <text x="680" y="1494" class="tit" font-size="13">Canhotos WhatsApp / ZIP</text>
    <text x="680" y="1516" class="mod">/canhotos_assinados &#183; /validar_canhoto</text>
    <text x="680" y="1536" class="sub">Esteira de confer&#234;ncia documental</text>
  </g>
  <line x1="520" y1="1577" x2="520" y2="1602" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 8 -->
  <rect x="30" y="1609" width="980" height="28" rx="6" fill="#ef4444"/>
  <text x="520" y="1628" class="fase" text-anchor="middle">FASE 8 &#8212; OCORR&#202;NCIAS, DEVOLU&#199;&#213;ES E AGENDAMENTOS</text>
  <g>
    <rect x="80" y="1654" width="420" height="118" rx="10" fill="#1e293b" stroke="#ef4444"/>
    <text x="100" y="1681" class="tit" font-size="14">Ocorr&#234;ncias e devolu&#231;&#245;es</text>
    <text x="100" y="1703" class="sub">P&#225;tio &#183; hist&#243;rico sequencial &#183; motivos &#183; fotos &#183; status NF</text>
    <text x="100" y="1723" class="mod">/devolucao &#183; /gerenciar_motivos &#183; /relatorio</text>
    <text x="100" y="1743" class="sub">Gest&#227;o de exce&#231;&#245;es sem perder rastreio</text>
  </g>
  <g>
    <rect x="540" y="1654" width="420" height="118" rx="10" fill="#1e293b" stroke="#ef4444"/>
    <text x="560" y="1681" class="tit" font-size="14">Agendamentos e coletas FOB</text>
    <text x="560" y="1703" class="sub">Farol de prazo &#183; minuta e-mail &#183; coletas pendentes</text>
    <text x="560" y="1723" class="mod">/formulario &#183; /registrar_coleta &#183; /relatorio_coletas</text>
    <text x="560" y="1743" class="sub">SLA de retirada sob controle</text>
  </g>
  <line x1="520" y1="1772" x2="520" y2="1797" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 9 -->
  <rect x="30" y="1804" width="980" height="28" rx="6" fill="#14b8a6"/>
  <text x="520" y="1823" class="fase" text-anchor="middle">FASE 9 &#8212; FRETE, CUSTOS E VALIDA&#199;&#195;O FINANCEIRA</text>
  <g>
    <rect x="80" y="1849" width="880" height="118" rx="10" fill="#1e293b" stroke="#14b8a6"/>
    <text x="100" y="1876" class="tit" font-size="14">Controle e valida&#231;&#227;o de fretes</text>
    <text x="100" y="1898" class="sub">Modal &#183; transportadora &#183; valor NF &#183; volume frete FOB &#183; concilia&#231;&#227;o cobran&#231;a</text>
    <text x="100" y="1918" class="mod">/relatorio_faturamento &#183; /custos_pessoais &#183; KPIs modais na Torre</text>
    <text x="100" y="1938" class="sub">Evita pagar frete indevido ou cobrar cliente sem lastro</text>
  </g>
  <line x1="520" y1="1967" x2="520" y2="1992" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FASE 10 -->
  <rect x="30" y="1999" width="980" height="28" rx="6" fill="#a855f7"/>
  <text x="520" y="2018" class="fase" text-anchor="middle">FASE 10 &#8212; INDICADORES E GEST&#195;O &#192; VISTA</text>
  <g>
    <rect x="80" y="2044" width="270" height="110" rx="10" fill="#1e293b" stroke="#a855f7"/>
    <text x="100" y="2071" class="tit" font-size="13">Torre de controle</text>
    <text x="100" y="2093" class="mod">/torre_controle</text>
    <text x="100" y="2113" class="sub">Meta &#183; realizado</text>
  </g>
  <g>
    <rect x="370" y="2044" width="270" height="110" rx="10" fill="#1e293b" stroke="#a855f7"/>
    <text x="390" y="2071" class="tit" font-size="13">Pain&#233;is TV</text>
    <text x="390" y="2093" class="mod">/monitor &#183; /tv_coletas_fob</text>
    <text x="390" y="2113" class="sub">/tv_devolucoes &#183; /tv_canhotos</text>
  </g>
  <g>
    <rect x="660" y="2044" width="300" height="110" rx="10" fill="#1e293b" stroke="#a855f7"/>
    <text x="680" y="2071" class="tit" font-size="13">Indicadores e auditoria</text>
    <text x="680" y="2093" class="mod">/painel_indicadores &#183; /auditoria_torre</text>
    <text x="680" y="2113" class="sub">Lead times &#183; efici&#234;ncia expedi&#231;&#227;o</text>
  </g>

  <!-- LOOP BACK -->
  <path d="M 960 2100 C 1020 2100, 1020 180, 960 120" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8 5" marker-end="url(#arrow)"/>
  <text x="990" y="1100" class="sub" font-size="10" transform="rotate(90 990 1100)">Melhoria cont&#237;nua &#183; dados retroalimentam pedido e estoque</text>

  <rect x="80" y="2185" width="880" height="95" rx="10" fill="#151f32" stroke="#334155"/>
  <text x="520" y="2218" class="tit" font-size="15" text-anchor="middle">RESULTADO: OPERA&#199;&#195;O LOG&#205;STICA EFICIENTE E CONFI&#193;VEL</text>
  <text x="520" y="2244" class="sub" font-size="12" text-anchor="middle">Um &#250;nico sistema &#183; um &#250;nico banco &#183; rastreio por NF do pedido ao indicador</text>
  <text x="520" y="2266" class="mod" text-anchor="middle">White-label &#183; rede local ou nuvem &#183; portal + execut&#225;vel Windows</text>

  <text x="520" y="3140" class="sub" font-size="11" text-anchor="middle">Sistema Log&#237;stico Integrado &#8212; fluxograma operacional v1.0</text>
</svg>
