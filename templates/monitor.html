<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="/static/css/portal-theme.css" rel="stylesheet">

    <title>📺 CONFIGURADOR DA TORRE DE CONTROLE LOGÍSTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: var(--portal-font); padding: 30px; }
        .card-config { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 25px; max-width: 600px; margin: 40px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #38bdf8; font-size: 18px; border-bottom: 2px solid #334155; padding-bottom: 10px; text-transform: uppercase; }
        .form-check-label { font-size: 13px; font-weight: bold; color: #e2e8f0; cursor: pointer; }
        .form-check-input:checked { background-color: #38bdf8; border-color: #38bdf8; }
        .form-control-sm { background-color: #0f172a; border: 1px solid #475569; color: #fff; font-family: var(--portal-font); }
        .btn-start { background: #10b981; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; border-radius: 6px; margin-top: 15px; text-transform: uppercase; }
        .btn-start:hover { background: #059669; }
        
        /* Layout de exibição da TV ativo */
        #painelTVAtivo { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #0f172a; z-index: 99999; }
        .container-tv { width: 100vw; height: 100vh; border: none; }
        .barra-status-tv { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); border-top: 1px solid #334155; padding: 6px 15px; display: flex; justify-content: space-between; align-items: center; color: #94a3b8; font-size: 11px; z-index: 999999; }
        .txt-destaque { color: #38bdf8; font-weight: bold; }
        .btn-voltar { background: #ef4444; color: white; border: none; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body class="portal-page embedded">

    <div id="painelConfiguracao" class="container">
        <div class="card-config">
            <h2>🛠️ SELEÇÃO DE TELAS DA TORRE (AUTONOMIA FOB)</h2>
            <p class="text-muted small">Selecione quais módulos logísticos você deseja colocar na TV de monitoramento hoje:</p>
            
            <form id="formSelecaoTorre" onsubmit="event.preventDefault(); iniciarLoopPersonalizado(); return false;">
                <div class="mb-3 border-bottom border-secondary pb-3">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/monitor_tv" id="chk1" checked data-nome="Torre de Controle (Painel)">
                        <label class="form-check-label" for="chk1">🚀 Rotação Principal — Torre de Controle (Painel)</label>
                    </div>

                    <!-- 🟢 NOVO MÓDULO INJETADO: CANHOTOS DO WHATSAPP -->
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/tv_canhotos_whatsapp" id="chk_whatsapp" checked data-nome="Canhotos WhatsApp">
                        <label class="form-check-label" for="chk_whatsapp">📱 Triagem Digital — Canhotos WhatsApp (Modo TV)</label>
                    </div>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/painel_indicadores" id="chk2" checked data-nome="Indicadores Rotativos">
                        <label class="form-check-label" for="chk2">📊 Gráficos Operacionais — Indicadores Rotativos</label>
                    </div>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/tv_coletas_fob" id="chk3" checked data-nome="Central de Coletas FOB">
                        <label class="form-check-label" for="chk3">🚚 Registro Ativo — Central de Coletas FOB (Modo TV)</label>
                    </div>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/tv_devolucoes" id="chk4" checked data-nome="Gestão de Devoluções">
                        <label class="form-check-label" for="chk4">🔄 Auditoria Fiscal — Gestão de Devoluções (Modo TV)</label>
                    </div>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/tv_pracas" id="chk_pracas" checked data-nome="Praças de Atendimento">
                        <label class="form-check-label" for="chk_pracas">🗺️ Cobertura Logística — Praças de Atendimento (Ultra Safe)</label>
                    </div>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="/auditoria_torre" id="chk5" checked data-nome="Carrossel Auditoria Frota">
                        <label class="form-check-label" for="chk5">🕵️ Inspeção de Placas — Carrossel Auditoria Frota</label>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-md-7">
                        <label class="form-label mb-0 fw-bold text-warning" style="font-size:12px;">⏳ TEMPO DE CADÊNCIA (SEGUNDOS):</label>
                    </div>
                    <div class="col-md-5">
                        <input type="number" id="tempoInput" class="form-control form-control-sm text-center fw-bold text-warning" value="5" min="2" required>
                    </div>
                </div>

                <button type="submit" class="btn-start">▶️ Iniciar Torre de Controle</button>
            </form>
        </div>
    </div>

    <div id="painelTVAtivo">
        <div class="barra-status-tv">
            <div>📡 STATUS: <span class="txt-destaque" style="color: #10b981;">TRANSMITINDO SELEÇÃO</span></div>
            <div>📺 EXIBINDO AGORA: <span id="nomePainelAtual" class="txt-destaque">-</span></div>
            <div>⏳ PRÓXIMA TROCA EM: <span id="contadorRegressivo" class="txt-destaque">-</span>s</div>
            <button type="button" class="btn-voltar" onclick="pararLoopEResetar()">⚙️ Ajustar Filtros</button>
        </div>
        <iframe id="iframeProjecaoTV" class="container-tv" src=""></iframe>
    </div>

    <script>
        let listaTelasEscolhidas = [];
        let tempoExibicao = 5; 
        let indiceAtual = 0;
        let tempoRestante = 5; 
        let intervaloCronometro = null;

        function iniciarLoopPersonalizado() {
            listaTelasEscolhidas = [];
            
            const checkboxes = document.querySelectorAll('.form-check-input:checked');
            
            if (checkboxes.length === 0) {
                alert("⚠️ ATENÇÃO OPERACIONAL:\n\nPor favor, selecione pelo menos uma tela para rodar na TV.");
                return;
            }

            checkboxes.forEach(function(chk) {
                listaTelasEscolhidas.push({
                    nome: chk.getAttribute('data-nome') || 'Painel',
                    url: chk.value.trim()
                });
            });

            tempoExibicao = parseInt(document.getElementById('tempoInput').value) || 5;
            tempoRestante = tempoExibicao;
            indiceAtual = 0;

            document.getElementById('painelConfiguracao').style.display = "none";
            document.getElementById('painelTVAtivo').style.display = "block";

            carregarProximaTelaDinamica();
            
            if (intervaloCronometro) clearInterval(intervaloCronometro);
            intervaloCronometro = setInterval(gerenciarCronometroDinamico, 1000);
        }

        function carregarProximaTelaDinamica() {
            if (listaTelasEscolhidas.length === 0) return;

            if (indiceAtual >= listaTelasEscolhidas.length) {
                indiceAtual = 0; 
            }

            const painel = listaTelasEscolhidas[indiceAtual];
            const tokenCache = new Date().getTime();
            
            let urlFinal = painel.url;
            if (urlFinal.includes('?')) {
                urlFinal += "&v=" + tokenCache;
            } else {
                urlFinal += "?v=" + tokenCache;
            }
            
            const iframe = document.getElementById('iframeProjecaoTV');
            const txtNome = document.getElementById('nomePainelAtual');
            const txtContador = document.getElementById('contadorRegressivo');

            if (iframe) iframe.src = urlFinal;
            if (txtNome) txtNome.innerText = painel.nome.toUpperCase();
            
            tempoRestante = tempoExibicao;
            if (txtContador) txtContador.innerText = tempoRestante;
            
            indiceAtual++;
        }

        function gerenciarCronometroDinamico() {
            tempoRestante--;
            const txtContador = document.getElementById('contadorRegressivo');
            if (txtContador) txtContador.innerText = tempoRestante;

            if (tempoRestante <= 0) {
                carregarProxima
