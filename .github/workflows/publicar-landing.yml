name: Publicar landing page

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/publicar-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar pasta docs
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
